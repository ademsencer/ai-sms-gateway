name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        working-directory: apps/android-client
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp apps/android-client/app/build/outputs/apk/debug/app-debug.apk \
             sms-gateway-${{ steps.sha.outputs.short }}.apk

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "SMS Gateway - Latest Build"
          body: |
            Auto-built from commit ${{ github.sha }}

            **Download:** `sms-gateway-${{ steps.sha.outputs.short }}.apk`

            Built at: ${{ github.event.head_commit.timestamp }}
          files: sms-gateway-${{ steps.sha.outputs.short }}.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            DEPLOY_DIR="/opt/sms-gateway"

            # First deploy: clone (private repo needs token)
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              cp .env.example .env
            else
              cd "$DEPLOY_DIR"
              git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
              git fetch origin main
              git reset --hard origin/main
            fi

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &>/dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # Build and deploy
            docker compose down || true
            docker compose up -d --build --remove-orphans

            # Wait for health
            echo "Waiting for services..."
            sleep 30

            # Verify
            docker compose ps
            echo "Deploy completed at $(date)"

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            DEPLOY_DIR="/opt/sms-gateway"

            # First deploy: clone (private repo needs token)
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              cp .env.example .env
            else
              cd "$DEPLOY_DIR"
              git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
              git fetch origin main
              git reset --hard origin/main
            fi

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &>/dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # Build and deploy
            docker compose down || true
            docker compose up -d --build --remove-orphans

            # Wait for health
            echo "Waiting for services..."
            sleep 30

            # Verify
            docker compose ps
            echo "Deploy completed at $(date)"

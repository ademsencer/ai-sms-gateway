name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      bump_type: ${{ steps.version.outputs.bump_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"

          # Parse current version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Analyze commit messages since last tag to determine bump type
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"%s" -10 2>/dev/null || echo "")
          fi

          BUMP="patch"

          # Check for major indicators
          if echo "$COMMITS" | grep -qiE '(BREAKING CHANGE|breaking:|major:)'; then
            BUMP="major"
          # Check for minor indicators (new features, significant additions)
          elif echo "$COMMITS" | grep -qiE '(feat|feature|add |added|new |implement|support|enhance)'; then
            BUMP="minor"
          fi

          # Apply bump
          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: $BUMP"
          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push || true

  build-apk:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        working-directory: apps/android-client
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PVERSION_NAME=${{ needs.version.outputs.version }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cp apps/android-client/app/build/outputs/apk/debug/app-debug.apk \
             sms-gateway-v${VERSION}.apk
          cp apps/android-client/app/build/outputs/apk/debug/app-debug.apk \
             sms-gateway-latest.apk

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          BUMP="${{ needs.version.outputs.bump_type }}"
          SHORT="${{ steps.sha.outputs.short }}"

          # Get commit messages since last release
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -10)
          fi

          cat > release_notes.md << NOTES_EOF
          ## SMS Gateway v${VERSION}

          **Version:** ${VERSION} (${BUMP} release)
          **Commit:** ${SHORT}
          **Built at:** $(date -u '+%Y-%m-%d %H:%M UTC')

          ### Changes
          ${CHANGES}

          ### Download
          - \`sms-gateway-v${VERSION}.apk\` — versioned build
          - \`sms-gateway-latest.apk\` — always latest
          NOTES_EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: "SMS Gateway v${{ needs.version.outputs.version }}"
          body_path: release_notes.md
          files: |
            sms-gateway-v${{ needs.version.outputs.version }}.apk
            sms-gateway-latest.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [version, build-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            DEPLOY_DIR="/opt/sms-gateway"
            VERSION="${{ needs.version.outputs.version }}"

            # First deploy: clone (private repo needs token)
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              cp .env.example .env
            else
              cd "$DEPLOY_DIR"
              git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
              git fetch origin main
              git reset --hard origin/main
            fi

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &>/dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # Build images first (no downtime during build)
            docker compose build --parallel

            # Recreate only changed services (infra stays up: mysql, redis, rabbitmq)
            docker compose up -d --no-build --remove-orphans

            # Wait for API gateway health check
            echo "Waiting for API gateway to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3005/api/health > /dev/null 2>&1; then
                echo "API gateway healthy!"
                break
              fi
              echo "  attempt $i/30..."
              sleep 5
            done

            # Download latest APK from GitHub Release for dashboard serving
            mkdir -p "$DEPLOY_DIR/downloads"
            RELEASE_JSON=$(curl -sL -H "Authorization: token ${{ secrets.GH_PAT }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}") || true
            # Extract the asset download URL for sms-gateway-latest.apk
            ASSET_URL=$(echo "$RELEASE_JSON" | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            for asset in data.get('assets', []):
                if asset['name'] == 'sms-gateway-latest.apk':
                    print(asset['url'])
                    break
            " 2>/dev/null) || true
            if [ -n "$ASSET_URL" ]; then
              curl -sL -H "Authorization: token ${{ secrets.GH_PAT }}" \
                -H "Accept: application/octet-stream" \
                "$ASSET_URL" -o "$DEPLOY_DIR/downloads/sms-gateway-latest.apk"
              echo "APK v${VERSION} downloaded to $DEPLOY_DIR/downloads/"
              ls -lh "$DEPLOY_DIR/downloads/sms-gateway-latest.apk"
            else
              echo "WARNING: Could not find APK asset in release v${VERSION}"
            fi

            # Verify
            docker compose ps
            echo "Deploy v${VERSION} completed at $(date)"
